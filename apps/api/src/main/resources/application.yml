server:
  port: ${API_PORT:8080}

spring:
  application:
    name: barops-api
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:barops}
    username: ${POSTGRES_USER:barops}
    password: ${POSTGRES_PASSWORD:barops_demo}
    hikari:
      maximum-pool-size: 5
  sql:
    init:
      mode: never

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
